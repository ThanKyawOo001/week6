  <body>
    <div>
      <table>
        <thead>
          <tr>
            <th style="width: 5%">ID</th>
            <th style="width: 30%">Name</th>
            <th>Midterm</th>
            <th>Final</th>
            <th>Total</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <script>
      $(document).ready(function () {
        function getGrade(total) {
          if (total >= 80) {return "A";}
          else if (total >= 70) {return "B";}
          else if (total >= 60) {return "C";}
          else if (total >= 50) {return "D";}
          return "F";
        }

        for (let i = 0; i < students.length; i++) {
          const data = students[i];
          const total = data.midterm + data.final;
          const grade = getGrade(total);

          const html = `
            <tr>
              <td>${data.id}</td>
              <td>${data.name}</td>
              <td class="midterm" id="mid-${i}">
                ${data.midterm}
                </td>

              <td class="final" id = "final-${i}">
                ${data.final}
                </td>
              <td id = "total-${i}">
                ${total}
                </td>
              <td id="grade-${i}">
                ${grade}
                </td>
            </tr>
          `;
          $("#table-body").append(html);
        }

        $(".midterm").on("click", function (){
          editScore($(this), "midterm");
        });

        $(".final").on("click", function (){
          editScore($(this), "final");
        });

        function editScore(cell, field) {
          const oldValue = cell.text().trim();
          cell.html('<input class="edit-box" type="number" min="0" max="50" value="' + oldValue + '" />');
         
          const input = cell.find("input");
          input.focus(); 
          input.on("keydown", function(event){
            if(event.key === "Escape"){
              cell.text(oldValue);
              return;
            }
            if(event.key === "Enter"){
              let value = parseInt(input.val());
              if(isNaN(value) || value < 0 || value > 50){
                alert("Score must be between 0 and 50.");
                return;
              }
              const index = cell.attr("id").split("-")[1];
              students[index][field] = value;
              cell.text(value);
              updateRow(index);
            }
          })

        }

        function updateRow(index){
          const data = students[index];
          const total = data.midterm + data.final;
          const grade = getGrade(total);
          $("#total-" + index).text(total);
          $("#grade-" + index).text(grade);
        }

        
      });


    </script>
