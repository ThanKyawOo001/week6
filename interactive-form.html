<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>.error-text{color:red;font-size:.9rem}.is-invalid{border-color:red!important}</style>
</head>
<body class="bg-light">
<div class="container mt-5"><div class="card shadow"><div class="card-body">
<h3 class="mb-4">Interactive Web Form</h3>

<div class="mb-3">
<label class="form-label">Username</label>
<input id="username" class="form-control">
<div class="error-text"></div>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input id="email" type="email" class="form-control">
<div class="error-text"></div>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input id="password" type="password" class="form-control">
<div class="error-text"></div>
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input id="confirmPassword" type="password" class="form-control">
<div class="error-text"></div>
</div>

<div class="mb-3">
<label class="form-label fw-bold">Interesting Topics <span id="topicError" class="error-text"></span></label>
<div class="form-check"><input class="form-check-input topic" type="checkbox"> HTML</div>
<div class="form-check"><input class="form-check-input topic" type="checkbox"> CSS</div>
<div class="form-check"><input class="form-check-input topic" type="checkbox"> JavaScript</div>
</div>

<div class="mb-3">
<label class="form-label fw-bold">Gender <span id="genderError" class="error-text"></span></label>
<select id="gender" class="form-select">
<option>--</option><option>Male</option><option>Female</option><option>Other</option>
</select>
</div>

<button id="submitBtn" class="btn btn-primary">Submit</button>
</div></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
$(function(){

function clearErr(el){
  el.removeClass("is-invalid");
  el.next(".error-text").text("");
}

$("#submitBtn").on("click",function(e){
e.preventDefault();
let ok=true;

["#username","#email","#password","#confirmPassword"].forEach(function(id){
 let f=$(id);
 clearErr(f);
 if($.trim(f.val())===""){
   f.addClass("is-invalid");
   f.next(".error-text").text("This field must not be empty");
   ok=false;
 }
});

if($("#password").val()!=="" && $("#confirmPassword").val()!=="" &&
   $("#password").val()!==$("#confirmPassword").val()){
   $("#confirmPassword").addClass("is-invalid");
   $("#confirmPassword").next(".error-text").text("Confirmed password mismatched the password");
   ok=false;
}

if($(".topic:checked").length===0){
  $("#topicError").text(" At least one topic must be selected");
  ok=false;
}else $("#topicError").text("");

if($("#gender").prop("selectedIndex")===0){
  $("#genderError").text(" Please choose your gender");
  $("#gender").addClass("is-invalid");
  ok=false;
}else{
  $("#genderError").text("");
  $("#gender").removeClass("is-invalid");
}

if(ok){
 alert("Form submitted successfully!");
}
});

$("input,select").on("input change",function(){
 if($(this).is("input")) clearErr($(this));
 if($(this).attr("id")==="gender"){
   $("#genderError").text("");
   $(this).removeClass("is-invalid");
 }
 if($(this).hasClass("topic")) $("#topicError").text("");
});

});
</script>
</body>
</html>
